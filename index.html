<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mutiara Kost</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body class="bg-sky-50 antialiased h-[2000px]"> 
  
  <nav x-data="{ open: false }" class="sticky top-0 z-50 bg-white/70 backdrop-blur-lg border-b border-white/50 w-full transition-all duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16 sm:h-20 w-full"> 
      
      <div class="flex-shrink-0 flex items-center h-full py-1">
        <img class="h-14 sm:h-16 w-auto object-contain transition-transform duration-300 hover:scale-105" src="mutiara kost logo.png" alt="Mutiara Kost Logo">
      </div>

      <div class="hidden md:block flex-grow h-full"></div>

      <div class="hidden md:flex items-center gap-3 h-full">
        <a href="https://wa.me/yournumber" target="_blank" class="inline-flex items-center justify-center gap-2 px-6 py-2.5 text-sm font-semibold text-white transition-colors duration-300 ease-in-out rounded-full bg-gradient-to-r from-emerald-400 to-emerald-600 hover:from-emerald-500 hover:to-emerald-700">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
          </svg>
          <span>Hubungi Kami</span>
        </a>
        
        <a href="https://maps.google.com" target="_blank" class="inline-flex items-center justify-center gap-2 px-6 py-2.5 text-sm font-semibold transition-colors duration-300 ease-in-out rounded-full bg-indigo-50 text-indigo-600 hover:bg-indigo-100 border border-indigo-100/50">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"></path>
          </svg>
          <span>Lokasi</span>
        </a>
      </div>

      <div class="md:hidden flex items-center">
        <button @click="open = !open" class="inline-flex items-center justify-center p-2 rounded-full text-slate-600 hover:text-slate-900 focus:outline-none bg-white/50 hover:bg-white transition-colors duration-200">
          <svg class="h-5 w-5" :class="{'hidden': open, 'block': !open }" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
          <svg class="h-5 w-5" :class="{'block': open, 'hidden': !open }" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>
    </div>

    <div x-show="open" 
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 -translate-y-2"
         x-transition:enter-end="opacity-100 translate-y-0"
         class="md:hidden border-t border-sky-100 bg-white/95 backdrop-blur-xl">
      <div class="flex p-4 gap-3 max-w-7xl mx-auto"> 
        <a href="https://wa.me/yournumber" class="flex-1 bg-gradient-to-r from-emerald-400 to-emerald-500 text-white rounded-xl py-3 flex items-center justify-center gap-2 active:scale-95 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
          <span class="text-sm font-semibold tracking-wide">WA</span>
        </a>
        <a href="https://maps.google.com" class="flex-1 bg-indigo-50 text-indigo-600 border border-indigo-100 rounded-xl py-3 flex items-center justify-center gap-2 active:scale-95 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"></path></svg>
          <span class="text-sm font-semibold tracking-wide">Maps</span>
        </a>
      </div>
    </div>
  </nav>
  <section x-data="{ isPlaying: false }" class="relative pt-12 pb-20 lg:pt-20 lg:pb-28 overflow-hidden">
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none">
      <div class="absolute -top-24 -right-24 w-96 h-96 bg-sky-200/50 rounded-full blur-3xl"></div>
      <div class="absolute top-1/2 -left-24 w-72 h-72 bg-white/60 rounded-full blur-3xl"></div>
    </div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
      
      <div class="flex flex-col lg:flex-row items-center w-full transition-all duration-[800ms] ease-in-out"
           :class="isPlaying ? 'lg:gap-0' : 'gap-12 lg:gap-16'">
        
        <div class="transition-all duration-[800ms] ease-in-out overflow-hidden flex-shrink-0"
             :class="isPlaying ? 'w-full lg:w-0 opacity-0 scale-95 pointer-events-none hidden lg:block' : 'w-full lg:w-1/2 opacity-100 scale-100'">
          
          <div class="w-full lg:w-[500px] xl:w-[560px] text-center lg:text-left">
            <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-white border border-sky-100 text-sky-600 text-sm font-semibold tracking-wide mb-6 shadow-sm">
              <span class="w-2 h-2 rounded-full bg-sky-500 animate-pulse"></span>
              Kamar Kosong Tersedia
            </div>
            <h1 class="text-4xl sm:text-5xl lg:text-6xl font-bold text-slate-800 leading-[1.15] mb-6 whitespace-nowrap">
              Hunian Nyaman, <br class="hidden sm:block"> 
              <span class="text-sky-600">Selangkah ke Kampus</span>
            </h1>
            <p class="text-lg text-slate-600 mb-8 leading-relaxed max-w-2xl mx-auto lg:mx-0">
              Temukan pengalaman ngekost terbaik dengan fasilitas lengkap, keamanan 24 jam, dan lingkungan tenang yang mendukung produktivitasmu.
            </p>
          </div>

        </div>

        <div class="transition-all duration-[800ms] ease-in-out w-full origin-right relative z-20"
             :class="isPlaying ? 'lg:w-full max-w-5xl mx-auto' : 'lg:w-1/2 max-w-lg mx-auto lg:max-w-none'">
          
          <div class="absolute -inset-2 bg-gradient-to-r from-sky-300 to-indigo-300 rounded-[2rem] blur-lg transition-opacity duration-700"
               :class="isPlaying ? 'opacity-80' : 'opacity-40'"></div>
          
          <div class="relative bg-black rounded-[2rem] overflow-hidden shadow-2xl border border-white/50 aspect-video group transition-transform duration-500"
               :class="isPlaying ? 'cursor-default scale-100' : 'cursor-pointer hover:scale-[1.02]'"
               @click="if(!isPlaying) isPlaying = true">
            
            <div class="absolute inset-0 transition-opacity duration-500 z-10" 
                 :class="isPlaying ? 'opacity-0 pointer-events-none' : 'opacity-100'">
              
              <img src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80" alt="Video Ruangan Kost" class="w-full h-full object-cover">
              <div class="absolute inset-0 bg-slate-900/20 transition-colors duration-300 group-hover:bg-slate-900/10"></div>
              
              <div class="absolute inset-0 flex items-center justify-center">
                <div class="w-16 h-16 sm:w-20 sm:h-20 bg-white/90 backdrop-blur-sm rounded-full flex items-center justify-center shadow-lg text-sky-600 transition-transform duration-300 group-hover:scale-110">
                  <svg class="w-8 h-8 sm:w-10 sm:h-10 ml-1.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>
                </div>
              </div>
              
              <div class="absolute bottom-4 left-4 bg-black/60 backdrop-blur-md text-white text-xs font-semibold px-3 py-1.5 rounded-full">
                Lihat Kamar (1:20)
              </div>
            </div>

            <template x-if="isPlaying">
              <div class="absolute inset-0 z-20 bg-black animate-[fadeIn_0.5s_ease-in-out]">
                
                <button @click.stop="isPlaying = false" class="absolute top-4 right-4 z-30 bg-black/50 hover:bg-black/80 backdrop-blur-md border border-white/20 rounded-full p-2 text-white transition-all hover:rotate-90">
                  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
                
                <iframe class="w-full h-full" src="https://www.youtube.com/embed/tgbNymZ7vqY?autoplay=1&mute=0" title="Video Kost" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
              </div>
            </template>

          </div>
        </div>

      </div>
    </div>
  </section>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>

</body>
</html>
